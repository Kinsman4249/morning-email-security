name: release

on:
  push:
    tags:
      - 'v*'

# Required for the workflow to write to the Releases API.
permissions:
  contents: write

jobs:
  release:
    name: Create release with assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch full history so auto-generated release notes can compare
          # against the previous tag.
          fetch-depth: 0

      - name: Verify tag matches CHANGELOG
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "Tag:     $TAG"
          echo "Version: $VERSION"
          if ! grep -q "^## \[$VERSION\]" CHANGELOG.md; then
            echo "WARNING: CHANGELOG.md has no [$VERSION] section."
            echo "Continuing, but release notes will fall back to auto-generation."
          fi

      - name: Stage release assets
        run: |
          mkdir -p release-assets
          cp setup-cve-alerts.sh release-assets/
          cp debsecan-filtered.sh    release-assets/
          cp uninstall.sh         release-assets/
          cp LICENSE              release-assets/
          cp README.md            release-assets/
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ startsWith(github.ref_name, 'v0.') }}
          files: |
            release-assets/setup-cve-alerts.sh
            release-assets/debsecan-filtered.sh
            release-assets/uninstall.sh
            release-assets/LICENSE
            release-assets/README.md
