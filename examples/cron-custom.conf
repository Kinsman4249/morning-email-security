# ============================================================
# Custom cron schedules for debsecan-filtered
#
# Replace /etc/cron.d/debsecan-report with one of these examples,
# or copy-paste a single line in and remove the others.
#
# Format reference:
#   minute hour day-of-month month day-of-week user command
#   *      *    *            *     *           root /path/to/cmd
# ============================================================

SHELL=/bin/bash
PATH=/usr/local/sbin:/usr/local/bin:/sbin:/bin:/usr/sbin:/usr/bin

# ─── Default: daily at 07:00 ───────────────────────────────────
# 0 7 * * * root /usr/local/bin/debsecan-filtered

# ─── Earlier morning (06:00) ───────────────────────────────────
# 0 6 * * * root /usr/local/bin/debsecan-filtered

# ─── Twice daily (07:00 and 17:00) ─────────────────────────────
# 0 7,17 * * * root /usr/local/bin/debsecan-filtered

# ─── Weekdays only at 08:00 ───────────────────────────────────
# 0 8 * * 1-5 root /usr/local/bin/debsecan-filtered

# ─── Business hours, every 4 hours, weekdays only ──────────────
# 0 9,13,17 * * 1-5 root /usr/local/bin/debsecan-filtered

# ─── Hourly during a high-alert period (incident response) ─────
# 0 * * * * root /usr/local/bin/debsecan-filtered

# ─── Three times a week (Mon, Wed, Fri at 07:00) ───────────────
# 0 7 * * 1,3,5 root /usr/local/bin/debsecan-filtered

# ─── Once a week (Monday morning summary, 07:00) ───────────────
# 0 7 * * 1 root /usr/local/bin/debsecan-filtered

# ─── 15 minutes after a known apt update window ────────────────
# (Useful if you have an unattended-upgrades window — alerts will
#  reflect post-patch state on the same day.)
# 15 6 * * * root /usr/local/bin/debsecan-filtered
